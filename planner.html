<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroFagus · Planner</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,system-ui,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
}

.auth-wrapper{
    width:100%;
    max-width:1050px;
    min-height:620px;
    display:grid;
    grid-template-columns:1fr 1fr;
    border-radius:34px;
    overflow:hidden;
    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 28px 90px rgba(0,0,0,.38);
}

.brand-panel{
    padding:60px;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.22), transparent 38%),
        linear-gradient(135deg,rgba(34,197,94,.12),rgba(20,184,166,.05));
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:22px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    display:grid;
    place-items:center;
    color:#052e16;
    font-size:32px;
    margin-bottom:28px;
}

.brand-panel h1{
    font-size:46px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:18px;
}

.brand-panel p{
    color:#cbd5e1;
    font-size:20px;
    line-height:1.6;
    max-width:360px;
}

.form-panel{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.form h2{
    font-size:32px;
    margin-bottom:10px;
}

.form-subtitle{
    color:#94a3b8;
    font-size:15px;
    margin-bottom:32px;
}

.field{
    margin-bottom:18px;
}

.field label{
    display:block;
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:8px;
}

.field input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#f8fafc;
    outline:none;
    font-size:15px;
}

.field input:focus{
    border-color:#22c55e;
}

input[readonly]{
    background:rgba(255,255,255,.03);
    color:#cbd5e1;
    cursor:not-allowed;
}

.btn{
    width:100%;
    height:52px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    color:#052e16;
    font-weight:900;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
}

.btn-secondary{
    width:100%;
    height:48px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    margin-top:12px;
}

.message{
    margin-top:18px;
    padding:12px;
    border-radius:14px;
    font-size:14px;
    display:none;
}

.message.error{
    display:block;
    background:rgba(239,68,68,.12);
    color:#fecaca;
    border:1px solid rgba(239,68,68,.25);
}

@media(max-width:850px){
    .auth-wrapper{
        grid-template-columns:1fr;
        min-height:auto;
    }

    .brand-panel{
        padding:42px;
        text-align:center;
        align-items:center;
    }

    .brand-panel h1{
        font-size:38px;
    }

    .brand-panel p{
        font-size:17px;
    }

    .form-panel{
        padding:42px;
    }
}

@media(max-width:520px){
    body{
        padding:14px;
    }

    .auth-wrapper{
        border-radius:24px;
    }

    .brand-panel,
    .form-panel{
        padding:28px;
    }

    .logo-icon{
        width:58px;
        height:58px;
        font-size:26px;
    }

    .brand-panel h1{
        font-size:30px;
    }

    .form h2{
        font-size:26px;
    }
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <section class="brand-panel">
        <div class="logo-icon">
            <i class="fa-solid fa-chart-pie"></i>
        </div>

        <h1>PLANNER</h1>

        <p>
            Vamos a partir por obtener los macros y crear los objetivos.
        </p>
    </section>

    <section class="form-panel">

        <div class="form">
            <h2>Datos iniciales</h2>
            <p class="form-subtitle">
                Completa estos datos para calcular tu TMB.
            </p>

            <div class="field">
                <label>Nombre</label>
                <input type="text" id="nombreUsuario" readonly>
            </div>

            <div class="field">
                <label>Sexo</label>
                <input type="text" id="sexoUsuario" readonly>
            </div>

            <div class="field">
                <label>Peso actual (kg)</label>
                <input type="number" id="peso" placeholder="Ej: 78" min="1" step="0.1">
            </div>

            <div class="field">
                <label>Altura (cm)</label>
                <input type="number" id="altura" placeholder="Ej: 175" min="1" step="1">
            </div>

            <div class="field">
                <label>Edad</label>
                <input type="number" id="edad" placeholder="Ej: 35" min="1" step="1">
            </div>

            <button class="btn" onclick="calcularTMB()">
                Continuar
            </button>

            <button class="btn-secondary" onclick="window.location.href='dashboard.html'">
                Volver al Hub
            </button>

            <div id="mensaje" class="message"></div>
        </div>

    </section>

</div>

<script>
const KEY_USUARIOS = "macrofagus_usuarios";
const KEY_ACTIVO = "macrofagus_usuario_activo";

let usuarioActivo = JSON.parse(localStorage.getItem(KEY_ACTIVO));

if(!usuarioActivo){
    window.location.href = "index.html";
}

document.getElementById("nombreUsuario").value =
    usuarioActivo.nombre + " " + usuarioActivo.apellidos;

document.getElementById("sexoUsuario").value =
    usuarioActivo.sexo;

if(usuarioActivo.planner){
    if(usuarioActivo.planner.peso) document.getElementById("peso").value = usuarioActivo.planner.peso;
    if(usuarioActivo.planner.altura) document.getElementById("altura").value = usuarioActivo.planner.altura;
    if(usuarioActivo.planner.edad) document.getElementById("edad").value = usuarioActivo.planner.edad;
}

function obtenerUsuarios(){
    return JSON.parse(localStorage.getItem(KEY_USUARIOS)) || [];
}

function guardarUsuarios(usuarios){
    localStorage.setItem(KEY_USUARIOS, JSON.stringify(usuarios));
}

function mostrarMensaje(texto){
    const msg = document.getElementById("mensaje");
    msg.textContent = texto;
    msg.className = "message error";
}

function guardarUsuarioActivo(){
    localStorage.setItem(KEY_ACTIVO, JSON.stringify(usuarioActivo));

    const usuarios = obtenerUsuarios();

    const usuariosActualizados = usuarios.map(u => {
        if(u.id === usuarioActivo.id){
            return usuarioActivo;
        }
        return u;
    });

    guardarUsuarios(usuariosActualizados);
}

function calcularTMB(){
    const peso = parseFloat(document.getElementById("peso").value);
    const altura = parseFloat(document.getElementById("altura").value);
    const edad = parseInt(document.getElementById("edad").value);
    const sexo = usuarioActivo.sexo.toLowerCase();

    if(!peso || !altura || !edad){
        mostrarMensaje("Completa peso, altura y edad.");
        return;
    }

    let tmb = 0;

    if(sexo === "masculino" || sexo === "hombre"){
        tmb = ((10 * peso) + (6.25 * altura) - (5 * edad) + 5);
    }else{
        tmb = ((10 * peso) + (6.25 * altura) - (5 * edad) - 161);
    }

    tmb = Math.round(tmb);

    usuarioActivo.planner = {
        ...usuarioActivo.planner,
        peso,
        altura,
        edad,
        tmb
    };

    guardarUsuarioActivo();

    window.location.href = "planner-actividad.html";
}
</script>

</body>
</html>
