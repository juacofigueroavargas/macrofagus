<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroFagus · Calorías</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,system-ui,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
}

.auth-wrapper{
    width:100%;
    max-width:1050px;
    min-height:620px;
    display:grid;
    grid-template-columns:1fr 1fr;
    border-radius:34px;
    overflow:hidden;
    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 28px 90px rgba(0,0,0,.38);
}

.brand-panel{
    padding:60px;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.22), transparent 38%),
        linear-gradient(135deg,rgba(34,197,94,.12),rgba(20,184,166,.05));
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:22px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    display:grid;
    place-items:center;
    color:#052e16;
    font-size:32px;
    margin-bottom:28px;
}

.brand-panel h1{
    font-size:46px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:18px;
}

.brand-panel p{
    color:#cbd5e1;
    font-size:20px;
    line-height:1.6;
    max-width:360px;
}

.form-panel{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.top-bar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:24px;
}

.hub-btn{
    height:42px;
    padding:0 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    cursor:pointer;
    font-size:13px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
}

.hub-btn i{
    color:#86efac;
}

.form h2{
    font-size:32px;
    margin-bottom:10px;
}

.form-subtitle{
    color:#94a3b8;
    font-size:15px;
    margin-bottom:28px;
}

.result-box{
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.25);
    border-radius:18px;
    padding:22px;
    margin-bottom:26px;
}

.result-box span{
    display:block;
    color:#94a3b8;
    font-size:13px;
    margin-bottom:8px;
}

.result-box strong{
    font-size:38px;
    color:#86efac;
}

.options{
    display:grid;
    gap:12px;
    margin-bottom:18px;
}

.option{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#f8fafc;
    border-radius:14px;
    padding:16px;
    cursor:pointer;
    text-align:left;
    font-weight:800;
}

.option span{
    display:block;
    color:#94a3b8;
    font-size:13px;
    font-weight:500;
    margin-top:4px;
}

.option.active{
    border-color:#22c55e;
    background:rgba(34,197,94,.12);
}

.field{
    display:none;
    margin-bottom:18px;
}

.field label{
    display:block;
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:8px;
}

.field input{
    width:100%;
    padding:15px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#f8fafc;
    outline:none;
    font-size:15px;
}

.btn{
    width:100%;
    height:52px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    color:#052e16;
    font-weight:900;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
}

.btn-secondary{
    width:100%;
    height:48px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    margin-top:12px;
}

.message{
    margin-top:18px;
    padding:12px;
    border-radius:14px;
    font-size:14px;
    display:none;
}

.message.error{
    display:block;
    background:rgba(239,68,68,.12);
    color:#fecaca;
    border:1px solid rgba(239,68,68,.25);
}

@media(max-width:850px){
    .auth-wrapper{
        grid-template-columns:1fr;
        min-height:auto;
    }

    .brand-panel{
        padding:42px;
        text-align:center;
        align-items:center;
    }

    .form-panel{
        padding:42px;
    }

    .brand-panel h1{
        font-size:38px;
    }
}

@media(max-width:520px){
    body{
        padding:14px;
    }

    .brand-panel,
    .form-panel{
        padding:28px;
    }

    .auth-wrapper{
        border-radius:24px;
    }

    .brand-panel h1{
        font-size:30px;
    }

    .result-box strong{
        font-size:32px;
    }
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <section class="brand-panel">
        <div class="logo-icon">
            <i class="fa-solid fa-bolt"></i>
        </div>

        <h1>PLANNER</h1>

        <p>
            Ya tenemos tus calorías necesarias. Ahora puedes ajustar el objetivo.
        </p>
    </section>

    <section class="form-panel">

        <div class="top-bar">
            <button class="hub-btn" onclick="window.location.href='app.html'">
                <i class="fa-solid fa-house"></i>
                Hub
            </button>
        </div>

        <div class="form">
            <h2>Calorías necesarias</h2>

            <p class="form-subtitle">
                Este valor se calculó usando tu TMB y tu nivel de actividad.
            </p>

            <div class="result-box">
                <span>Calorías necesarias</span>
                <strong id="caloriasNecesarias">0 kcal</strong>
            </div>

            <p class="form-subtitle">
                ¿Quieres modificar las calorías para hacer déficit o superávit?
            </p>

            <div class="options">
                <button class="option" onclick="seleccionarAjuste('deficit', this)">
                    Déficit
                    <span>Comer menos que tus calorías necesarias.</span>
                </button>

                <button class="option" onclick="seleccionarAjuste('superavit', this)">
                    Superávit
                    <span>Comer más que tus calorías necesarias.</span>
                </button>

                <button class="option" onclick="seleccionarAjuste('mantener', this)">
                    No modificar
                    <span>Usar las calorías necesarias como objetivo.</span>
                </button>
            </div>

            <div class="field" id="campoAjuste">
                <label id="labelAjuste">Cantidad de calorías</label>
                <input type="number" id="cantidadAjuste" placeholder="Ej: 500">
            </div>

            <button class="btn" onclick="continuarMacros()">
                Calcular macros
            </button>

            <button class="btn-secondary" onclick="window.location.href='planner-actividad.html'">
                Volver
            </button>

            <div id="mensaje" class="message"></div>
        </div>

    </section>

</div>

<script>
const KEY_USUARIOS = "macrofagus_usuarios";
const KEY_ACTIVO = "macrofagus_usuario_activo";

let usuarioActivo = JSON.parse(localStorage.getItem(KEY_ACTIVO));
let tipoAjuste = "";

if(!usuarioActivo){
    window.location.href = "index.html";
}

if(!usuarioActivo.planner || !usuarioActivo.planner.caloriasNecesarias){
    window.location.href = "planner-actividad.html";
}

document.getElementById("caloriasNecesarias").textContent =
    usuarioActivo.planner.caloriasNecesarias + " kcal";

function obtenerUsuarios(){
    return JSON.parse(localStorage.getItem(KEY_USUARIOS)) || [];
}

function guardarUsuarios(usuarios){
    localStorage.setItem(KEY_USUARIOS, JSON.stringify(usuarios));
}

function guardarUsuarioActivo(){
    localStorage.setItem(KEY_ACTIVO, JSON.stringify(usuarioActivo));

    const usuarios = obtenerUsuarios();

    const usuariosActualizados = usuarios.map(u => {
        if(u.id === usuarioActivo.id){
            return usuarioActivo;
        }

        return u;
    });

    guardarUsuarios(usuariosActualizados);
}

function mostrarMensaje(texto){
    const msg = document.getElementById("mensaje");
    msg.textContent = texto;
    msg.className = "message error";
}

function seleccionarAjuste(tipo, boton){
    tipoAjuste = tipo;

    document.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("active");
    });

    boton.classList.add("active");

    const campo = document.getElementById("campoAjuste");
    const label = document.getElementById("labelAjuste");

    if(tipo === "deficit"){
        campo.style.display = "block";
        label.textContent = "Déficit en calorías";
        document.getElementById("cantidadAjuste").placeholder = "Ej: 500";
    }

    if(tipo === "superavit"){
        campo.style.display = "block";
        label.textContent = "Superávit en calorías";
        document.getElementById("cantidadAjuste").placeholder = "Ej: 300";
    }

    if(tipo === "mantener"){
        campo.style.display = "none";
        document.getElementById("cantidadAjuste").value = "";
    }
}

function continuarMacros(){
    if(!tipoAjuste){
        mostrarMensaje("Selecciona una opción.");
        return;
    }

    const base = usuarioActivo.planner.caloriasNecesarias;
    let ajuste = parseInt(document.getElementById("cantidadAjuste").value) || 0;
    let caloriasObjetivo = base;

    if(tipoAjuste === "deficit"){

    if(!ajuste){
        mostrarMensaje("Ingresa el déficit.");
        return;
    }

    ajuste = Math.abs(ajuste) * -1;

    caloriasObjetivo = base + ajuste;
}

if(tipoAjuste === "superavit"){

    if(!ajuste){
        mostrarMensaje("Ingresa el superávit.");
        return;
    }

    ajuste = Math.abs(ajuste);

    caloriasObjetivo = base + ajuste;
}

    if(tipoAjuste === "mantener"){
        ajuste = 0;
        caloriasObjetivo = base;
    }

    usuarioActivo.planner = {
        ...usuarioActivo.planner,
        tipoAjuste,
        ajusteCalorias: ajuste,
        caloriasObjetivo
    };

    guardarUsuarioActivo();
    window.location.href = "planner-macros.html";
}
</script>

</body>
</html>
