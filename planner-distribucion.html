<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroFagus · Distribución</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,system-ui,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
}

.auth-wrapper{
    width:100%;
    max-width:1050px;
    min-height:620px;
    display:grid;
    grid-template-columns:1fr 1fr;
    border-radius:34px;
    overflow:hidden;
    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 28px 90px rgba(0,0,0,.38);
}

.brand-panel{
    padding:60px;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.22), transparent 38%),
        linear-gradient(135deg,rgba(34,197,94,.12),rgba(20,184,166,.05));
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:22px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    display:grid;
    place-items:center;
    color:#052e16;
    font-size:32px;
    margin-bottom:28px;
}

.brand-panel h1{
    font-size:46px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:18px;
}

.brand-panel p{
    color:#cbd5e1;
    font-size:20px;
    line-height:1.6;
    max-width:360px;
}

.form-panel{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.top-bar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:24px;
}

.hub-btn{
    height:42px;
    padding:0 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    cursor:pointer;
    font-size:13px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
}

.hub-btn i{
    color:#86efac;
}

.form h2{
    font-size:32px;
    margin-bottom:10px;
}

.form-subtitle{
    color:#94a3b8;
    font-size:15px;
    margin-bottom:24px;
}

.options{
    display:grid;
    gap:12px;
    margin-bottom:20px;
}

.option{
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#f8fafc;
    border-radius:16px;
    padding:18px;
    cursor:pointer;
    text-align:left;
    font-weight:900;
}

.option span{
    display:block;
    color:#94a3b8;
    font-size:13px;
    font-weight:500;
    margin-top:5px;
}

.option.active{
    border-color:#22c55e;
    background:rgba(34,197,94,.12);
}

.btn{
    width:100%;
    height:52px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    color:#052e16;
    font-weight:900;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
}

.btn-secondary{
    width:100%;
    height:48px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    margin-top:12px;
}

.message{
    margin-top:18px;
    padding:12px;
    border-radius:14px;
    font-size:14px;
    display:none;
}

.message.error{
    display:block;
    background:rgba(239,68,68,.12);
    color:#fecaca;
    border:1px solid rgba(239,68,68,.25);
}

.result-table{
    display:none;
    margin-top:22px;
    border:1px solid rgba(255,255,255,.10);
    border-radius:18px;
    overflow:hidden;
}

.row{
    display:grid;
    grid-template-columns:1.2fr .8fr .8fr .8fr;
    gap:10px;
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:14px;
}

.row.header{
    background:rgba(255,255,255,.08);
    color:#86efac;
    font-weight:900;
}

.row:last-child{
    border-bottom:none;
}

.row span{
    color:#cbd5e1;
}

@media(max-width:850px){
    .auth-wrapper{
        grid-template-columns:1fr;
        min-height:auto;
    }

    .brand-panel{
        padding:42px;
        text-align:center;
        align-items:center;
    }

    .form-panel{
        padding:42px;
    }

    .brand-panel h1{
        font-size:38px;
    }
}

@media(max-width:620px){
    body{
        padding:14px;
    }

    .brand-panel,
    .form-panel{
        padding:28px;
    }

    .auth-wrapper{
        border-radius:24px;
    }

    .brand-panel h1{
        font-size:30px;
    }

    .form h2{
        font-size:26px;
    }

    .row{
        grid-template-columns:1fr;
        gap:4px;
    }

    .row.header{
        display:none;
    }
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <section class="brand-panel">
        <div class="logo-icon">
            <i class="fa-solid fa-table-cells-large"></i>
        </div>

        <h1>PLANNER</h1>

        <p>
            Ahora distribuiremos tus macros durante el día.
        </p>
    </section>

    <section class="form-panel">

        <div class="top-bar">
            <button class="hub-btn" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                Hub
            </button>
        </div>

        <div class="form">
            <h2>Distribuir macros</h2>

            <p class="form-subtitle">
                Selecciona cuántas comidas quieres usar para repartir tus macros diarios.
            </p>

            <div class="options">

    <button class="option" onclick="seleccionarComidas(4, this)">
        4 comidas
        <span>Desayuno, almuerzo, colación y cena.</span>
    </button>

    <button class="option" onclick="seleccionarComidas(5, this)">
        5 comidas
        <span>Desayuno, colación, almuerzo, colación y cena.</span>
    </button>

    <button class="option" onclick="seleccionarComidas(6, this)">
        6 comidas
        <span>Desayuno, colación, almuerzo, colación, cena y colación.</span>
    </button>

</div>

            <button class="btn" onclick="calcularDistribucion()">
                Continuar
            </button>

            <button class="btn-secondary" onclick="window.location.href='planner-resultado.html'">
                Volver
            </button>

            <div id="mensaje" class="message"></div>

        </div>

    </section>

</div>

<script>
const KEY_USUARIOS = "macrofagus_usuarios";
const KEY_ACTIVO = "macrofagus_usuario_activo";

let usuarioActivo = JSON.parse(localStorage.getItem(KEY_ACTIVO));
let comidasSeleccionadas = null;

if(!usuarioActivo){
    window.location.href = "index.html";
}

if(!usuarioActivo.planner || !usuarioActivo.planner.proteinasGr){
    window.location.href = "planner-resultado.html";
}

function obtenerUsuarios(){
    return JSON.parse(localStorage.getItem(KEY_USUARIOS)) || [];
}

function guardarUsuarios(usuarios){
    localStorage.setItem(KEY_USUARIOS, JSON.stringify(usuarios));
}

function guardarUsuarioActivo(){
    localStorage.setItem(KEY_ACTIVO, JSON.stringify(usuarioActivo));

    const usuarios = obtenerUsuarios();

    const usuariosActualizados = usuarios.map(u => {
        if(u.id === usuarioActivo.id){
            return usuarioActivo;
        }

        return u;
    });

    guardarUsuarios(usuariosActualizados);
}

function mostrarMensaje(texto){
    const msg = document.getElementById("mensaje");
    msg.textContent = texto;
    msg.className = "message error";
}

function limpiarMensaje(){
    const msg = document.getElementById("mensaje");
    msg.textContent = "";
    msg.className = "message";
}

function seleccionarComidas(cantidad, boton){
    comidasSeleccionadas = cantidad;

    document.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("active");
    });

    boton.classList.add("active");
}

function calcularDistribucion(){

    limpiarMensaje();

    if(!comidasSeleccionadas){
        mostrarMensaje("Selecciona 4, 5 o 6 comidas.");
        return;
    }

    const planner = usuarioActivo.planner;

    let distribucion = [];
    
    if(comidasSeleccionadas === 4){

    distribucion = [
        {nombre:"Desayuno", porcentaje:30},
        {nombre:"Almuerzo", porcentaje:35},
        {nombre:"Colación", porcentaje:10},
        {nombre:"Cena", porcentaje:25}
    ];

}

    if(comidasSeleccionadas === 5){

        distribucion = [
            {nombre:"Desayuno", porcentaje:30},
            {nombre:"Colación 1", porcentaje:10},
            {nombre:"Almuerzo", porcentaje:30},
            {nombre:"Colación 2", porcentaje:10},
            {nombre:"Cena", porcentaje:20}
        ];

    }

    if(comidasSeleccionadas === 6){

        distribucion = [
            {nombre:"Desayuno", porcentaje:25},
            {nombre:"Colación 1", porcentaje:10},
            {nombre:"Almuerzo", porcentaje:30},
            {nombre:"Colación 2", porcentaje:10},
            {nombre:"Cena", porcentaje:15},
            {nombre:"Colación 3", porcentaje:10}
        ];

    }

    const resultado = distribucion.map(item => {

        return {
            comida:item.nombre,
            porcentaje:item.porcentaje,
            proteinas:Math.round(planner.proteinasGr * item.porcentaje / 100),
            carbos:Math.round(planner.carbosGr * item.porcentaje / 100),
            grasas:Math.round(planner.grasasGr * item.porcentaje / 100)
        };

    });

    usuarioActivo.planner = {
        ...usuarioActivo.planner,
        cantidadComidas: comidasSeleccionadas,
        distribucionMacros: resultado
    };

    guardarUsuarioActivo();

    window.location.href = "planner-distribucion-resultado.html";

}
</script>

</body>
</html>
