<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroFagus · Distribución Resultado</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,system-ui,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#111827);
    color:#f8fafc;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
}

.auth-wrapper{
    width:100%;
    max-width:1050px;
    min-height:620px;
    display:grid;
    grid-template-columns:1fr 1fr;
    border-radius:34px;
    overflow:hidden;
    background:rgba(15,23,42,.9);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 28px 90px rgba(0,0,0,.38);
}

.brand-panel{
    padding:60px;
    background:
        radial-gradient(circle at top left, rgba(34,197,94,.22), transparent 38%),
        linear-gradient(135deg,rgba(34,197,94,.12),rgba(20,184,166,.05));
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.logo-icon{
    width:70px;
    height:70px;
    border-radius:22px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    display:grid;
    place-items:center;
    color:#052e16;
    font-size:32px;
    margin-bottom:28px;
}

.brand-panel h1{
    font-size:46px;
    font-weight:900;
    letter-spacing:1px;
    margin-bottom:18px;
}

.brand-panel p{
    color:#cbd5e1;
    font-size:20px;
    line-height:1.6;
    max-width:360px;
}

.form-panel{
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.top-bar{
    width:100%;
    display:flex;
    justify-content:flex-end;
    margin-bottom:24px;
}

.hub-btn{
    height:42px;
    padding:0 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.12);
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    cursor:pointer;
    font-size:13px;
    font-weight:800;
    display:flex;
    align-items:center;
    gap:8px;
}

.hub-btn i{
    color:#86efac;
}

.form h2{
    font-size:32px;
    margin-bottom:10px;
}

.form-subtitle{
    color:#94a3b8;
    font-size:15px;
    margin-bottom:24px;
}

.summary-box{
    background:rgba(34,197,94,.12);
    border:1px solid rgba(34,197,94,.25);
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
}

.summary-box span{
    display:block;
    color:#94a3b8;
    font-size:13px;
    margin-bottom:8px;
}

.summary-box strong{
    font-size:32px;
    color:#86efac;
}

.table{
    border:1px solid rgba(255,255,255,.10);
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
}

.row{
    display:grid;
    grid-template-columns:1.2fr .8fr .8fr .8fr;
    gap:10px;
    padding:14px;
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:14px;
}

.row.header{
    background:rgba(255,255,255,.08);
    color:#86efac;
    font-weight:900;
}

.row:last-child{
    border-bottom:none;
}

.row span{
    color:#94a3b8;
}

.btn{
    width:100%;
    height:52px;
    border:0;
    border-radius:14px;
    background:linear-gradient(135deg,#22c55e,#14b8a6);
    color:#052e16;
    font-weight:900;
    font-size:15px;
    cursor:pointer;
    margin-top:8px;
}

.btn-secondary{
    width:100%;
    height:48px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:#cbd5e1;
    font-weight:800;
    font-size:14px;
    cursor:pointer;
    margin-top:12px;
}

@media(max-width:850px){
    .auth-wrapper{
        grid-template-columns:1fr;
        min-height:auto;
    }

    .brand-panel{
        padding:42px;
        text-align:center;
        align-items:center;
    }

    .form-panel{
        padding:42px;
    }

    .brand-panel h1{
        font-size:38px;
    }
}

@media(max-width:620px){
    body{
        padding:14px;
        display:block;
    }

    .brand-panel{
        display:none;
    }

    .form-panel{
        padding:28px;
    }

    .auth-wrapper{
        display:block;
        border-radius:24px;
        min-height:auto;
    }

    .form h2{
        font-size:32px;
    }

    .row{
        grid-template-columns:1.2fr .8fr .8fr .8fr;
        gap:8px;
        font-size:13px;
        padding:12px;
    }

    .row.header{
        display:grid;
    }

    .table{
        overflow-x:auto;
    }
}
</style>
</head>

<body>

<div class="auth-wrapper">

    <section class="brand-panel">
        <div class="logo-icon">
            <i class="fa-solid fa-table-list"></i>
        </div>

        <h1>PLANNER</h1>

        <p>
            Esta es la distribución de macros según la cantidad de comidas seleccionada.
        </p>
    </section>

    <section class="form-panel">

        <div class="top-bar">
            <button class="hub-btn" onclick="window.location.href='dashboard.html'">
                <i class="fa-solid fa-house"></i>
                Hub
            </button>
        </div>

        <div class="form">
            <h2>Distribución final</h2>

            <p class="form-subtitle">
                Revisa cómo quedaron distribuidos tus macros durante el día.
            </p>

            <div class="summary-box">
                <span>Distribución seleccionada</span>
                <strong id="cantidadComidas">0 comidas</strong>
            </div>

            <div class="table">
                <div class="row header">
                    <div>Comida</div>
                    <div>Proteínas</div>
                    <div>Carbos</div>
                    <div>Grasas</div>
                </div>

                <div id="filasDistribucion"></div>
            </div>

            <button class="btn" onclick="window.location.href='planner-resumen-final.html'">
    		Finalizar
	    </button>

            <button class="btn-secondary" onclick="window.location.href='planner-distribucion.html'">
                Volver
            </button>
        </div>

    </section>

</div>

<script>
const KEY_ACTIVO = "macrofagus_usuario_activo";

let usuarioActivo = JSON.parse(localStorage.getItem(KEY_ACTIVO));

if(!usuarioActivo){
    window.location.href = "index.html";
}

if(
    !usuarioActivo.planner ||
    !usuarioActivo.planner.distribucionMacros ||
    usuarioActivo.planner.distribucionMacros.length === 0
){
    window.location.href = "planner-distribucion.html";
}

const planner = usuarioActivo.planner;

document.getElementById("cantidadComidas").textContent =
    planner.cantidadComidas + " comidas";

const filas = document.getElementById("filasDistribucion");
filas.innerHTML = "";

planner.distribucionMacros.forEach(item => {
    filas.innerHTML += `
        <div class="row">
            <div>
                <strong>${item.comida}</strong>
                <span>(${item.porcentaje}%)</span>
            </div>
            <div>${item.proteinas} g</div>
            <div>${item.carbos} g</div>
            <div>${item.grasas} g</div>
        </div>
    `;
});
</script>

</body>
</html>
